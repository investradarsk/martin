name: Fetch Tweets

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  fetch-tweets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tweets from nitter RSS
        run: |
          python3 - <<'EOF'
          import urllib.request, json, xml.etree.ElementTree as ET, sys

          nitter_hosts = [
            'nitter.net',
            'nitter.privacydev.net',
            'nitter.poast.org',
            'nitter.1d4.us'
          ]

          items = []
          for host in nitter_hosts:
            try:
              url = f'https://{host}/InvestRadarSK/rss'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                xml_data = r.read()
              root = ET.fromstring(xml_data)
              ns = {'atom': 'http://www.w3.org/2005/Atom'}
              channel = root.find('channel')
              if channel is None:
                continue
              for item in channel.findall('item')[:5]:
                title = item.findtext('title', '').strip()
                link = item.findtext('link', '').strip()
                pub_date = item.findtext('pubDate', '').strip()
                if title and title != 'InvestRadarSK':
                  items.append({'title': title, 'pubDate': pub_date, 'link': link})
              if items:
                print(f'Got {len(items)} tweets from {host}', file=sys.stderr)
                break
            except Exception as e:
              print(f'Failed {host}: {e}', file=sys.stderr)
              continue

          result = {'ok': len(items) > 0, 'items': items}
          with open('tweets.json', 'w', encoding='utf-8') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
          print('Saved tweets.json')
          EOF

      - name: Commit tweets.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f tweets.json
          git diff --staged --quiet || git commit -m "Update tweets.json [skip ci]"
          git push
