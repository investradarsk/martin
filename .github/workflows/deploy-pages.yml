name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'netlify/' \
            --exclude '.codex-evening.patch' \
            --exclude 'index.backup-before-evening.html' \
            --exclude 'investradar-design.html' \
            --exclude 'investradar-design (1).html' \
            --exclude 'investradar_slides_v5_editorial.html' \
            --exclude '*.zip' \
            --exclude '*.winmd' \
            --exclude 'tajne.txt' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
